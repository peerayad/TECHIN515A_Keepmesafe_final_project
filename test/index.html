<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KeepMeSafe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #080C10;
  --surface: #0F1520;
  --surface2: #162030;
  --border: rgba(255,255,255,0.07);
  --text: #E8EDF5;
  --muted: #4A5568;
  --green: #00E5A0;
  --green-dim: rgba(0,229,160,0.08);
  --green-border: rgba(0,229,160,0.2);
  --red: #FF4757;
  --red-dim: rgba(255,71,87,0.08);
  --red-border: rgba(255,71,87,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(8,12,16,0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}
.logo-name { font-size: 14px; font-weight: 600; }
.logo-sub  { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); margin-top: 1px; }
.conn-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; font-size: 10px;
  font-family: 'Space Mono', monospace; color: var(--muted);
  transition: all 0.3s;
}
.conn-pill.online { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
.conn-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
.conn-dot.on { background: var(--green); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── TABS ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  position: sticky; top: 53px; z-index: 9;
  background: var(--bg);
}
.tab-btn {
  flex: 1; padding: 10px 4px;
  background: none; border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

/* ── CONTENT ── */
.tab-content { display: none; padding: 14px 16px; flex-direction: column; gap: 12px; }
.tab-content.active { display: flex; }

.section-label {
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase;
}

/* ── ALERT BANNER ── */
.alert-banner {
  background: var(--red-dim); border: 1px solid var(--red-border);
  border-radius: 14px; padding: 12px 14px;
  display: none; align-items: center; gap: 12px;
  animation: slideIn 0.3s ease;
}
.alert-banner.show { display: flex; }
@keyframes slideIn { from{transform:translateY(-6px);opacity:0} to{transform:translateY(0);opacity:1} }
.alert-icon { font-size: 20px; animation: blink 1s ease-in-out infinite; }
.alert-banner-title { font-size: 13px; font-weight: 600; color: var(--red); }
.alert-banner-sub { font-size: 10px; color: rgba(255,71,87,0.6); font-family: 'Space Mono', monospace; margin-top: 2px; }

/* ── STATUS CARD ── */
.status-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  transition: all 0.4s;
}
.status-card.alert  { border-color: var(--red-border); background: var(--red-dim); }
.status-card.secure { border-color: var(--green-border); background: var(--green-dim); }
.status-row { display: flex; align-items: center; gap: 12px; }
.status-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 3px; }
.status-val { font-size: 18px; font-weight: 600; }
.status-val.green { color: var(--green); }
.status-val.red   { color: var(--red); animation: blink 1s ease-in-out infinite; }
.status-time { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 8px; }

/* ── INFO CHIPS ── */
.info-row { display: flex; gap: 8px; }
.info-chip {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px;
}
.info-chip-label { font-size: 9px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.info-chip-val { font-size: 13px; font-weight: 500; color: var(--green); }
.info-chip-val.red { color: var(--red); }
.info-chip-val.muted { color: var(--muted); }

/* ── SNAPSHOT (เล็กลง) ── */
.snap-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: border-color 0.4s;
}
.snap-card.alert { border-color: var(--red-border); }
.snap-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
}
.snap-tag { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--green); }
.snap-meta { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); }
.snap-img-wrap {
  width: 100%; background: #050810;
  display: flex; align-items: center; justify-content: center;
  max-height: 220px;
  overflow: hidden;
}
.snap-img-wrap img { width: 100%; max-height: 220px; object-fit: contain; display: block; }
.snap-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 28px 0; color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace;
}
.snap-placeholder svg { width: 28px; height: 28px; opacity: 0.2; }
.snap-footer {
  padding: 8px 14px; font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--muted); border-top: 1px solid var(--border);
  display: flex; justify-content: space-between;
}

/* ── DISMISS BTN ── */
.btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s; display: none;
}
.btn.show { display: block; }
.btn-dismiss { background: var(--surface2); color: #94A3B8; border: 1px solid var(--border); }

/* ── HISTORY GALLERY ── */
.gallery-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.gallery-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s;
}
.gallery-item:hover { border-color: var(--green-border); }
.gallery-img-wrap { width: 100%; height: 90px; background: #050810; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.gallery-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
.gallery-no-img {
  width: 100%; height: 90px; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: 10px;
  font-family: 'Space Mono', monospace;
}
.gallery-info { padding: 7px 9px; }
.gallery-num  { font-size: 11px; font-weight: 500; color: var(--text); }
.gallery-time { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 360px; overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 13px; font-weight: 600; }
.modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; line-height: 1;
}
.modal-img { width: 100%; display: block; }
.modal-footer {
  padding: 10px 16px; font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--muted); border-top: 1px solid var(--border);
}

/* ── EVENT LOG ── */
.hist-list { display: flex; flex-direction: column; gap: 6px; }
.hist-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
.hist-badge { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.hist-badge.alert { background: rgba(255,71,87,0.12); }
.hist-badge.ok    { background: rgba(0,229,160,0.1); }
.hist-badge.sys   { background: rgba(255,255,255,0.05); }
.hist-title { font-size: 11px; font-weight: 500; color: var(--text); }
.hist-time  { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
.empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo-name">KeepMeSafe</div>
    <div class="logo-sub">GuardianPod · Room 304</div>
  </div>
  <div class="conn-pill" id="conn-pill">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-label">Connecting</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('home', this)">Home</button>
  <button class="tab-btn" onclick="switchTab('history', this)">History</button>
</div>

<!-- ==================== HOME TAB ==================== -->
<div class="tab-content active" id="tab-home">

  <!-- Alert banner -->
  <div class="alert-banner" id="alert-banner">
    <div class="alert-icon">🚨</div>
    <div>
      <div class="alert-banner-title">Intrusion Detected!</div>
      <div class="alert-banner-sub" id="banner-sub">—</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-card" id="status-card">
    <div class="status-row">
      <div style="font-size:28px;" id="status-emoji">🛡</div>
      <div>
        <div class="status-label">Current status</div>
        <div class="status-val green" id="status-val">SECURED</div>
      </div>
    </div>
    <div class="status-time" id="status-time">Waiting for data...</div>
  </div>

  <!-- Info chips -->
  <div class="info-row">
    <div class="info-chip">
      <div class="info-chip-label">Alert #</div>
      <div class="info-chip-val" id="chip-num">—</div>
    </div>
    <div class="info-chip">
      <div class="info-chip-label">Status</div>
      <div class="info-chip-val" id="chip-status">—</div>
    </div>
    <div class="info-chip">
      <div class="info-chip-label">Time</div>
      <div class="info-chip-val muted" id="chip-ts">—</div>
    </div>
  </div>

  <!-- Latest snapshot (เล็กลง) -->
  <div class="section-label">Latest Snapshot</div>
  <div class="snap-card" id="snap-card">
    <div class="snap-topbar">
      <span class="snap-tag">LATEST SNAPSHOT</span>
      <span class="snap-meta" id="snap-num">Alert #—</span>
    </div>
    <div class="snap-img-wrap" id="snap-wrap">
      <div class="snap-placeholder" id="snap-placeholder">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <circle cx="12" cy="14" r="3"/>
          <path d="M9 7l1-3h4l1 3"/>
        </svg>
        Waiting for snapshot...
      </div>
      <img id="snap-img" style="display:none;" alt="Snapshot">
    </div>
    <div class="snap-footer">
      <span id="snap-size">— KB</span>
      <span id="snap-time">—</span>
    </div>
  </div>


</div>

<!-- ==================== HISTORY TAB ==================== -->
<div class="tab-content" id="tab-history">
  <div class="section-label">All Snapshots</div>
  <div class="gallery-grid" id="gallery-grid">
    <div class="empty-state" style="grid-column:span 2;" id="empty-gallery">No snapshots yet</div>
  </div>
</div>


<!-- MODAL (ดูรูปเต็ม) -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Snapshot</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <img class="modal-img" id="modal-img" alt="Full snapshot">
    <div class="modal-footer" id="modal-footer">—</div>
  </div>
</div>

<script>
// ==========================================
// FIREBASE CONFIG — ใส่ค่าจริงของคุณ
// ==========================================
const firebaseConfig = {
  apiKey:      "AIzaSyCL5Qkl4_dQSaam9Miwp8wqqrokE9odjdY",
  authDomain:  "keepmesafe-1e248.firebaseapp.com",
  databaseURL: "https://keepmesafe-1e248-default-rtdb.firebaseio.com",
  projectId:   "keepmesafe-1e248"
};

const ROOM_ID  = "room304";
const DB_ROOT  = `/keepmesafe/${ROOM_ID}/alerts`;

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let snapshots = {};  // เก็บ snapshot ทุกอัน

// ==========================================
// CONNECTION
// ==========================================
db.ref('.info/connected').on('value', snap => {
  const online = snap.val();
  document.getElementById('conn-dot').className   = 'conn-dot' + (online ? ' on' : '');
  document.getElementById('conn-pill').className  = 'conn-pill' + (online ? ' online' : '');
  document.getElementById('conn-label').textContent = online ? 'Online' : 'Offline';
});

// ==========================================
// LISTEN — latest (Home tab real-time)
// ==========================================
db.ref(DB_ROOT + '/latest').on('value', snap => {
  const data = snap.val();
  if (!data) return;

  const isAlert  = data.status === 'ALERT';
  const alertNum = data.alert_num || 0;

  // Status card
  const card = document.getElementById('status-card');
  card.className = 'status-card ' + (isAlert ? 'alert' : 'secure');
  document.getElementById('status-emoji').textContent = isAlert ? '🚨' : '🛡';
  const val = document.getElementById('status-val');
  val.textContent = isAlert ? 'ALERT' : 'SECURED';
  val.className   = 'status-val ' + (isAlert ? 'red' : 'green');
  document.getElementById('status-time').textContent = 'Last updated · ' + new Date().toLocaleTimeString();

  // Alert banner
  const banner = document.getElementById('alert-banner');
  banner.className = 'alert-banner' + (isAlert ? ' show' : '');
  document.getElementById('banner-sub').textContent = (data.message || '') + ' · Alert #' + alertNum;

  // Chips
  document.getElementById('chip-num').textContent    = alertNum;
  document.getElementById('chip-status').textContent = data.status || '—';
  document.getElementById('chip-status').className   = 'info-chip-val' + (isAlert ? ' red' : '');
  document.getElementById('chip-ts').textContent     = data.timestamp
    ? new Date(data.timestamp).toLocaleTimeString()
    : new Date().toLocaleTimeString();



  // Snapshot
  if (data.image) {
    const img = document.getElementById('snap-img');
    const ph  = document.getElementById('snap-placeholder');
    img.src = 'data:image/jpeg;base64,' + data.image;
    img.style.display = 'block';
    ph.style.display  = 'none';
    document.getElementById('snap-card').className = 'snap-card' + (isAlert ? ' alert' : '');
    document.getElementById('snap-num').textContent  = 'Alert #' + alertNum;
    document.getElementById('snap-size').textContent = Math.round(data.image.length * 0.75 / 1024) + ' KB';
    document.getElementById('snap-time').textContent = new Date().toLocaleTimeString();
  }
});

// ==========================================
// LISTEN — ทุก alert (History tab)
// ==========================================
db.ref(DB_ROOT).orderByKey().limitToLast(20).on('value', snap => {
  const allData = snap.val();
  if (!allData) return;

  // โหลด/บันทึกเวลาของแต่ละ alert ใน localStorage
  const savedTimes = JSON.parse(localStorage.getItem('kms_alert_times') || '{}');

  Object.keys(allData).forEach(key => {
    if (key === 'latest') return;
    if (!savedTimes[key]) {
      // alert ใหม่ที่ไม่เคยเห็น — บันทึกเวลาปัจจุบัน
      savedTimes[key] = allData[key].timestamp
        ? new Date(allData[key].timestamp).toLocaleString()
        : new Date().toLocaleString();
    }
    snapshots[key] = { ...allData[key], receivedTime: savedTimes[key] };
  });

  localStorage.setItem('kms_alert_times', JSON.stringify(savedTimes));

  renderGallery();

});

// ==========================================
// GALLERY RENDER
// ==========================================
function renderGallery() {
  const grid  = document.getElementById('gallery-grid');
  const empty = document.getElementById('empty-gallery');
  const keys  = Object.keys(snapshots).sort((a, b) => {
    // เรียงจากใหม่ → เก่า
    const na = parseInt(a.replace('alert_', '')) || 0;
    const nb = parseInt(b.replace('alert_', '')) || 0;
    return nb - na;
  });

  if (!keys.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = keys.map(key => {
    const d = snapshots[key];
    const num = d.alert_num || key;
    const hasImg = !!d.image;
    return `
      <div class="gallery-item" onclick="openModal('${key}')">
        <div class="gallery-img-wrap">
          ${hasImg
            ? `<img src="data:image/jpeg;base64,${d.image}" alt="Alert ${num}">`
            : `<div class="gallery-no-img">No image</div>`}
        </div>
        <div class="gallery-info">
          <div class="gallery-num">Alert #${num}</div>
          <div class="gallery-time">${d.timestamp ? new Date(d.timestamp).toLocaleString() : '—'}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ==========================================
// MODAL
// ==========================================
function openModal(key) {
  const d = snapshots[key];
  if (!d) return;
  document.getElementById('modal-title').textContent  = 'Alert #' + (d.alert_num || key);
  document.getElementById('modal-img').src            = d.image ? 'data:image/jpeg;base64,' + d.image : '';
  document.getElementById('modal-footer').textContent = d.message + ' · ' + (d.timestamp ? new Date(d.timestamp).toLocaleString() : '');
  document.getElementById('modal').className = 'modal-overlay show';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.currentTarget === document.querySelector('.modal-close')) {
    document.getElementById('modal').className = 'modal-overlay';
  }
}

// ==========================================
// TABS
// ==========================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ==========================================
</script>
</body>
</html>
